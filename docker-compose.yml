version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    container_name: ptof-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ptof123

  postgres:
    image: postgres:16
    container_name: ptof-postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ptof
      POSTGRES_PASSWORD: ptof123
      POSTGRES_DB: ptof_logs
